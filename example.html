<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeInv Indigo Design Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F5F3FF;
            --surface: #FFFFFF;
            --foreground: #1E1B4B;
            --primary: #6366F1;
            --cta: #10B981;
            --text-muted: #64748B;
            --border: rgba(99, 102, 241, 0.1);
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Open Sans', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1E1B4B;
                --surface: #2E2A6F;
                --foreground: #F5F3FF;
                --primary: #818CF8;
                --text-muted: #A5B4FC;
            }
        }

        body {
            background: var(--bg);
            color: var(--foreground);
            font-family: var(--font-body);
            padding: 2rem;
            transition: background 0.3s, color 0.3s;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1, h2 { font-family: var(--font-heading); }

        .btn {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-cta { background: var(--cta); }
    </style>
</head>
<body>
    <div class="card">
        <h1>OfficeInv Dashboard</h1>
        <p style="color: var(--text-muted)">Professional Inventory Management</p>
        <div style="margin-top: 1rem; display: flex; gap: 1rem;">
            <button class="btn"><i data-lucide="plus"></i> Add Item</button>
            <button class="btn btn-cta"><i data-lucide="check"></i> Approve</button>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
